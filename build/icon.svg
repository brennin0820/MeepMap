<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="MeepMap">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#170f21"/>
      <stop offset="45%" stop-color="#0d0f17"/>
      <stop offset="100%" stop-color="#0a0d14"/>
    </linearGradient>
    <linearGradient id="gem" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f56887"/>
      <stop offset="100%" stop-color="#d64785"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect x="24" y="24" width="464" height="464" rx="80" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="4"/>
  <g filter="url(#glow)">
    <path d="M256 96 L384 256 L256 416 L128 256 Z" fill="url(#gem)"/>
    <path d="M256 128 L352 256 L256 384 L160 256 Z" fill="rgba(255,255,255,0.18)"/>
  </g>
  <circle cx="256" cy="256" r="6" fill="#ffffff" opacity="0.9"/>
</svg>

# Render Blueprint — deploy the WNBA Bet Predictor as a hosted web service.
# In the Render dashboard: New + > Blueprint, and point it at this repo.
# Render reads this file, provisions the service + persistent disk, and deploys.
services:
  - type: web
    name: meepmap-wnba-predictor
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: node server/index.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      # Writable, persistent location for journal / bankroll / prediction history.
      - key: DATA_DIR
        value: /var/data
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1

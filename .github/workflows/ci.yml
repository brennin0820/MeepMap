name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    - name: Install dependencies
      run: npm ci

    - name: Run engine tests
      run: npm test

    - name: Server smoke test (boot + health check)
      run: |
        node server/index.js &
        SERVER_PID=$!
        ok=0
        for i in $(seq 1 20); do
          if curl -sf http://localhost:3847/api/health > /dev/null; then
            echo "Server healthy"
            ok=1
            break
          fi
          sleep 1
        done
        kill "$SERVER_PID" 2>/dev/null || true
        if [ "$ok" -ne 1 ]; then
          echo "Server failed to pass health check"
          exit 1
        fi
